<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; background: #121212; color: #ffffff; text-align: center; margin: 0; padding: 10px; }
    
    /* Tab Navigation Styles */
    .tabs { margin-bottom: 20px; }
    .tab-btn { padding: 10px 20px; margin: 0 5px; cursor: pointer; background: #333333; color: white; border: none; border-radius: 5px; font-size: 16px; }
    .tab-btn.active { background: #e74c3c; }
    
    /* Hides the inactive game */
    .game-section { display: none; }
    .game-section.active { display: block; }
    
    /* The responsive flex container that replaces the rigid grid */
    .card-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 20px; }
    
    /* Game-specific card sizing */
    .card-papayoo { width: 45px; height: 45px; background-image: url('papayoo.jpg'); border-radius: 8px; cursor: pointer; }
    .card-hearts { width: 84px; height: 117px; background-image: url('cards.jpg');  background-size: 1092px 468px; border-radius: 8px; cursor: pointer; }
    
    .played { filter: grayscale(100%) brightness(30%); }
    .reset-btn { padding: 10px 20px; margin-bottom: 20px; cursor: pointer; background: #555555; color: white; border: none; border-radius: 5px; }
  </style>
</head>
<body>

  <div class="tabs">
    <button class="tab-btn active" id="btn-papayoo" onclick="switchTab('papayoo')">Papayoo</button>
    <button class="tab-btn" id="btn-hearts" onclick="switchTab('hearts')">Hearts</button>
  </div>

  <button class="reset-btn" onclick="resetBoard()">Reset Current Board</button>

  <div id="view-papayoo" class="game-section active">
    <div class="card-list" id="papayoo-list"></div>
  </div>

  <div id="view-hearts" class="game-section">
    <div class="card-list" id="hearts-list"></div>
  </div>

  <script>
    // Tab Switching Logic
    function switchTab(game) {
      document.querySelectorAll('.game-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      document.getElementById('view-' + game).classList.add('active');
      document.getElementById('btn-' + game).classList.add('active');
    }

    // Reset Logic (Only resets the visible tab)
    function resetBoard() {
      const activeGame = document.querySelector('.game-section.active');
      const allPlayed = activeGame.querySelectorAll('.played');
      allPlayed.forEach(card => card.classList.remove('played'));
    }

    // Unified Papayoo List (One loop for all 60 cards)
    function buildPapayoo() {
      const list = document.getElementById('papayoo-list');
      for (let i = 0; i < 60; i++) {
        let btn = document.createElement('div');
        btn.className = 'card-papayoo';
        
        let col = i % 10; 
        let row = Math.floor(i / 10); 
        
        btn.style.backgroundPosition = -(col * 90) + 'px ' + -(row * 152) + 'px';
        btn.onclick = function() { this.classList.toggle('played'); };
        list.appendChild(btn);
      }
    }

    buildPapayoo();
    
        // Hearts List (52 cards, 13 columns)
    function buildHearts() {
      const list = document.getElementById('hearts-list');
      for (let i = 0; i < 52; i++) {
        let btn = document.createElement('div');
        btn.className = 'card-hearts';
        
        // Math for 13 columns
        let col = i % 13; 
        let row = Math.floor(i / 13); 
        
        // Multiplied by your new Hearts dimensions (84w x 117h)
        let xPos = -(col * 84);
        let yPos = -(row * 117);
        
        btn.style.backgroundPosition = xPos + 'px ' + yPos + 'px';
        btn.onclick = function() { this.classList.toggle('played'); };
        list.appendChild(btn);
      }
    }

    // Call the function to actually draw the cards on the page
    buildHearts();
  </script>
</body>
</html>
